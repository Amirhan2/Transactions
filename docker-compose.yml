version: "3.9"

name: transactions

networks:
  trans-net:

volumes:
  pg_transfer_data:
  pg_wallet_data:

services:
  # Kafka(KRaft mode)
  kafka:
    image: apache/kafka:3.9.1
    container_name: trans-kafka
    networks: [trans-net]
    ports:
      - "9092:9092" # слева порт у меня, справа порт в контейнере
    environment:
      # KRaft single-node
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # listeners
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      # dev-friendly
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_DEFAULT REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Postgres
  transfer-db:
    image: postgres:16
    container_name: trans-transfer-db
    networks: [trans-net]
    ports:
      - "5433:5432"
    environment:
      # При первом запуске Postgres создаст пользователя user, задаст ему пароль и сделает его владельцем transfer_db
      - POSTGRES_DB=transfer_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - pg_transfer_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d transfer_db" ]
      interval: 10s
      timeout: 5s
      retries: 12

  wallet-db:
    image: postgres:16
    container_name: trans-transfer-db
    networks: [trans-net]
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=wallet_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - pg_wallet_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d wallet_db" ]
      interval: 10s
      timeout: 5s
      retries: 12

  # Redis
  redis:
    image: redis:7-alpine
    container_name: trans-redis
    networks: [trans-net]
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
